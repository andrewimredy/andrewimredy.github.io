<!DOCTYPE html>
<head>
    <title>Shake your Phone | Accelerometer demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <script src="js/speedo.js"></script>
    <style>
        #displayContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
        }
        #accelerationDisplay, #xDisplay, #yDisplay, #zDisplay, #maxGDisplay #speedDisplay{
            font-size: 2.4rem;
            font-weight: bold;
            text-align: center;
            margin: 0.5em 0;
        }
        #xDisplay { color: red; }
        #yDisplay { color: green; }
        #zDisplay { color: blue; }
        #startAccelBtn {
            font-size:2rem;
            padding:2rem 4rem;
            color:blue;
        }
    </style>
</head>
<body>
    <div id="centerContainer" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div style="text-align:center;">
            <!-- <p style="font-size:1.5rem;">Hold phone still, then press Start</p> -->
            <button id="startAccelBtn">Start Accelerometer</button>
        </div>
    </div>
    <div id="displayContainer">
        <p id="accelerationDisplay"></p>
        <p id="xDisplay"></p>
        <p id="yDisplay"></p>
        <p id="zDisplay"></p>
        <p id="maxGDisplay"></p>
        <!-- <p id="speedDisplay"></p> -->
    </div>
</body>
